var VS="\nattribute float aSize;\nattribute vec3 aColor;\nattribute float aCharIdx;\nattribute float aBrightness;\nattribute float aLife; // 1 = alive, 0..1 = fading\nuniform float uSize;\nuniform float uTime;\nvarying vec3 vColor;\nvarying float vCharIdx;\nvarying float vBrightness;\nvarying float vLife;\nvoid main(){\n  vColor = aColor; vCharIdx = aCharIdx; vBrightness = aBrightness; vLife = aLife;\n  vec4 mv = modelViewMatrix * vec4(position, 1.0);\n  gl_Position = projectionMatrix * mv;\n  float dist = -mv.z;\n  gl_PointSize = uSize * aSize * (350.0 / max(50.0, dist));\n}";
