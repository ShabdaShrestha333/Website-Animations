  function setActive(i){
    chipsEls.forEach((c,k)=>c.classList.toggle('show',k===i));
    dotsEls .forEach((c,k)=>c.classList.toggle('show',k===i));
    if(i>=0){
      const L=LAYERS[i];
      const tipX=toCanvasX(L.side==='right'?SVG_W:0), tipY=toCanvasY(L.midY);
      dotsEls[i].style.left=tipX+'px'; dotsEls[i].style.top=tipY+'px';
    }
  }
  cvs.addEventListener('mousemove',e=>{
    const r=cvs.getBoundingClientRect();
    mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; mouse.active=true;
    setActive(hitLayer(e.clientX,e.clientY));
  });
  cvs.addEventListener('mouseleave',()=>{mouse.active=false;setActive(-1)});
  window.addEventListener('resize',resize);
  resize();
  requestAnimationFrame(()=>{placeChips();requestAnimationFrame(frame);});
})();
</script>
</body>
</html>
